name: CI

# PR gate: typecheck, tests, and a clean bundle build must pass before merge.
# Required on `main` via the "Protect main" ruleset. Also runs on push to main
# so the default branch always carries a CI status.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# One run per ref; a new push supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
